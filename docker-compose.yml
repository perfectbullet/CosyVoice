name: cosyvoice-tts-stack

services:
  # MongoDB 服务
  mongodb:
    image: mongo:6.0
    container_name: tts_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"  # 暴露 MongoDB 端口给外部
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: tts_password_2024
      MONGO_INITDB_DATABASE: tts_service
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - cosyvoice-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: cosyvoice_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 1024mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cosyvoice-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # CosyVoice TTS 服务
  cosyvoice:
    image: cosyvoice:v1.7
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: cosyvoice
    working_dir: /opt/CosyVoice
    # 修改启动命令为运行 FastAPI 服务
    command: python tts_service/main.py
    ports:
      - "50000:50000"  # 保留原有端口
      - "50001:50001"  # 保留原有端口
      - "50002:50002"    # FastAPI 服务端口
    volumes:
      # 时区同步
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

      # TTS 服务代码（新增）
      - ./tts_service:/opt/CosyVoice/tts_service

      # 音频输出目录（新增）
      - ./data/audio_outputs:/opt/CosyVoice/data/audio_outputs
      - ./data/speaker_audios:/opt/CosyVoice/data/speaker_audios

      # 原有挂载
      - ./runtime:/opt/CosyVoice/runtime
      - ./pretrained_models:/opt/CosyVoice/pretrained_models
      - ./data:/opt/CosyVoice/data
      - ./vllm_example.py:/opt/CosyVoice/vllm_example.py
      - ./webui.py:/opt/CosyVoice/webui.py
      - ./README.md:/opt/CosyVoice/README.md
      - ./requirements.txt:/opt/CosyVoice/requirements.txt
      - ./wheel_packages:/opt/CosyVoice/wheel_packages
      - ./cosyvoice:/opt/CosyVoice/cosyvoice
      - ./asset:/asset
      - ./examples:/opt/CosyVoice/examples
      - ./tools:/opt/CosyVoice/tools
      - ./modelscope_hub:/root/.cache/modelscope/hub
      - ./third_party:/opt/CosyVoice/third_party
      - ./.env:/opt/CosyVoice/.env
    environment:
      - TZ=Asia/Shanghai
      - LANG=zh_CN.UTF-8
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
    networks:
      - cosyvoice-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local

networks:
  cosyvoice-network:
    driver: bridge
